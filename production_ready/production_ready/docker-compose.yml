services:
  db:
    image: postgres:16-alpine
    container_name: scholarship_db
    environment:
      POSTGRES_DB: scholarshipdb
      POSTGRES_USER: scholar
      POSTGRES_PASSWORD: scholar123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U scholar -d scholarshipdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: scholarship_backend
    env_file:
      - ./backend/.env.docker
    environment:
      - UVICORN_WORKERS=4
    ports:
      - "8000:8000"
    volumes:
      - model_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: nginx:alpine
    container_name: scholarship_frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  model_storage:
